<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Ready – CV Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        .success-check {
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s linear forwards;
            pointer-events: none;
        }
        @keyframes confettiFall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center py-8 px-4">
    <div class="glass-card rounded-3xl shadow-2xl p-8 md:p-12 max-w-lg w-full text-center relative z-10">
        <div class="success-check inline-block bg-green-100 rounded-full p-4 mb-6">
            <i class="fas fa-check-circle text-green-500 text-6xl"></i>
        </div>

        <h2 class="text-3xl font-extrabold text-gray-800 mb-2">🎉 CV Ready!</h2>
        <p class="text-gray-500 mb-6">Your professional CV has been generated successfully.</p>

        <div class="bg-gray-50 rounded-2xl p-6 mb-6 border-2 border-dashed border-gray-200">
            <i class="fas fa-file-pdf text-red-500 text-3xl mb-2 block"></i>
            <p class="font-bold text-gray-700 text-lg">{{ name }}.pdf</p>
            <div class="flex justify-center gap-4 mt-2 text-xs text-gray-400">
                <span>📄 2 Pages</span>
                <span>⭐ Professional Layout</span>
                <span>📋 ATS-Optimized</span>
            </div>
        </div>

        <a href="/download/{{ filename }}"
            class="block btn-gradient text-white font-bold py-4 px-6 rounded-2xl transition-all duration-200 shadow-lg text-lg mb-4">
            <i class="fas fa-download mr-3"></i> Download CV
        </a>

        <a href="/"
            class="block bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 px-6 rounded-2xl transition-all duration-200">
            <i class="fas fa-plus mr-2"></i> Create Another CV
        </a>

        <div class="mt-6 text-xs text-gray-400 flex items-center justify-center gap-4">
            <span><i class="fas fa-shield-alt mr-1 text-green-500"></i> Secure</span>
            <span><i class="fas fa-clock mr-1 text-blue-500"></i> Auto-deleted</span>
            <span><i class="fas fa-lock mr-1 text-purple-500"></i> Private</span>
        </div>
    </div>

    <script>
        // Confetti effect
        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
            for (let i = 0; i < 50; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = '-10px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 8 + 4) + 'px';
                el.style.height = (Math.random() * 8 + 4) + 'px';
                el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                el.style.animationDelay = (Math.random() * 2) + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }
        }
        createConfetti();

        // Auto-download after 2 seconds
        setTimeout(function() {
            window.location.href = "/download/{{ filename }}";
        }, 2500);
    </script>
</body>
</html>
